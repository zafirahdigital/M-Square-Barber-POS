<!DOCTYPE html>
<html>
<head>
<title>M Square Barber POS</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

input,select{
padding:10px;
margin:5px;
}

button{
padding:10px;
background:#00c853;
border:none;
color:white;
cursor:pointer;
}

table{
margin:auto;
margin-top:20px;
}

</style>
</head>

<body>

<h1>💈 M Square Barber Shop POS</h1>

<input id="customer" placeholder="Customer Name">

<select id="service">
<option>Haircut</option>
<option>Beard Trim</option>
<option>Hair + Beard</option>
<option>Facial</option>
</select>

<input id="amount" placeholder="Amount">

<button onclick="addSale()">Create Bill</button>

<h2>Recent Sales</h2>

<table border="1">
<thead>
<tr>
<th>Customer</th>
<th>Service</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="salesTable"></tbody>

</table>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAU-HNotjDDd377h4vUtE6ItEIsQJNCpbw",
  authDomain: "msquare-barber-pos.firebaseapp.com",
  projectId: "msquare-barber-pos",
  storageBucket: "msquare-barber-pos.firebasestorage.app",
  messagingSenderId: "913126246014",
  appId: "1:913126246014:web:18aa07d63f145f522c7a2f",
  measurementId: "G-9XYZ3Z7JYT"    
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function addSale(){

let customer=document.getElementById("customer").value
let service=document.getElementById("service").value
let amount=document.getElementById("amount").value

db.collection("sales").add({
customer:customer,
service:service,
amount:amount,
date:new Date()
})

loadSales()

}

function loadSales(){

db.collection("sales").get().then(snapshot=>{

let table=document.getElementById("salesTable")

table.innerHTML=""

snapshot.forEach(doc=>{

let data=doc.data()

table.innerHTML+=`
<tr>
<td>${data.customer}</td>
<td>${data.service}</td>
<td>${data.amount}</td>
</tr>
`

})

})

}

loadSales()

</script>

</body>

</html>
