<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>M Square Barber POS</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<!-- Chart.js for dashboard graphs -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    margin:0;
    padding:0;
}
.header{
    text-align:center;
    background:#222;
    padding:20px;
    font-size:24px;
}
.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
    gap:20px;
}
.card{
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
    flex:1 1 300px;
}
input, select, button{
    width:100%;
    padding:10px;
    margin:5px 0;
}
button{
    background:#00c853;
    color:white;
    border:none;
    cursor:pointer;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
td,th{
    padding:8px;
    border-bottom:1px solid #333;
}
</style>
</head>
<body>

<div class="header">💈 M Square Barber Shop POS</div>

<div class="container">

<!-- New Bill Card -->
<div class="card">
<h3>Create New Bill</h3>
<input id="customer" placeholder="Customer Name">
<select id="service">
    <option>Haircut</option>
    <option>Beard Trim</option>
    <option>Hair + Beard</option>
    <option>Facial</option>
</select>
<select id="staff">
    <option>Ahmed</option>
    <option>Ali</option>
    <option>Bilal</option>
</select>
<input id="amount" placeholder="Amount">
<select id="payment">
    <option>Cash</option>
    <option>Easypaisa</option>
    <option>JazzCash</option>
</select>
<button onclick="addSale()">Create Bill</button>
</div>

<!-- Dashboard Card -->
<div class="card">
<h3>Today's Sales</h3>
<h2>Total: Rs <span id="totalsales">0</span></h2>
<canvas id="salesChart"></canvas>
</div>

<!-- Recent Bills Card -->
<div class="card">
<h3>Recent Bills</h3>
<table>
<thead>
<tr>
<th>Customer</th>
<th>Service</th>
<th>Amount</th>
</tr>
</thead>
<tbody id="salesTable"></tbody>
</table>
</div>

<script>
// ---------------- Firebase Setup ----------------
const firebaseConfig = {
  apiKey: "AIzaSyAU-HNotjDDd377h4vUtE6ItEIsQJNCpbw",
  authDomain: "msquare-barber-pos.firebaseapp.com",
  projectId: "msquare-barber-pos",
  storageBucket: "msquare-barber-pos.firebasestorage.app",
  messagingSenderId: "913126246014",
  appId: "1:913126246014:web:18aa07d63f145f522c7a2f",
  measurementId: "G-9XYZ3Z7JYT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ---------------- Add Sale Function ----------------
function addSale(){
    const customer = document.getElementById("customer").value;
    const service = document.getElementById("service").value;
    const staff = document.getElementById("staff").value;
    const amount = parseInt(document.getElementById("amount").value) || 0;
    const payment = document.getElementById("payment").value;

    if(!customer || amount<=0) { alert("Enter valid customer & amount"); return; }

    db.collection("sales").add({
        customer,
        service,
        staff,
        amount,
        payment,
        date: new Date()
    }).then(()=>{
        document.getElementById("customer").value="";
        document.getElementById("amount").value="";
        loadSales();
    });
}

// ---------------- Load Sales & Update Dashboard ----------------
async function loadSales(){
    const snapshot = await db.collection("sales").orderBy("date","desc").get();
    const table = document.getElementById("salesTable");
    table.innerHTML="";
    let total=0;
    const serviceCount={};

    snapshot.forEach(doc=>{
        const data = doc.data();
        total+=data.amount;
        table.innerHTML+=`
        <tr>
            <td>${data.customer}</td>
            <td>${data.service}</td>
            <td>${data.amount}</td>
        </tr>
        `;
        serviceCount[data.service] = (serviceCount[data.service] || 0)+1;
    });

    document.getElementById("totalsales").innerText = total;

    // Update Chart
    const ctx = document.getElementById('salesChart').getContext('2d');
    if(window.myChart) window.myChart.destroy(); // destroy old chart
    window.myChart = new Chart(ctx,{
        type:'bar',
        data:{
            labels:Object.keys(serviceCount),
            datasets:[{
                label:'Service Count',
                data:Object.values(serviceCount),
                backgroundColor:'#00c853'
            }]
        },
        options:{responsive:true,plugins:{legend:{display:false}}}
    });
}

// Initial load
loadSales();
</script>

</body>
</html>
